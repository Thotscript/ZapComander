<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZapBot — Entrar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0e;
      color: #e8e8ea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px;
    }

    /* Animated background gradient */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(37,211,102,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: #25D366;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e8e8ea;
      letter-spacing: -0.02em;
    }

    .brand-name span { color: #25D366; }

    .card {
      background: #13131a;
      border: 1px solid #1e1e28;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .card-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0f0f2;
      letter-spacing: -0.02em;
    }

    .card-header p {
      font-size: 0.88rem;
      color: #606070;
      line-height: 1.5;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #707080;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .field input {
      background: #0d0d14;
      border: 1px solid #1e1e28;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.92rem;
      color: #e8e8ea;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    .field input:focus {
      border-color: #25D366;
      box-shadow: 0 0 0 3px rgba(37,211,102,0.08);
    }
    .field input::placeholder { color: #333340; }

    .btn-primary {
      background: #25D366;
      color: #0a0a0e;
      border: none;
      border-radius: 10px;
      padding: 14px 0;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.01em;
      transition: opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #2a2a38;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e1e28;
    }

    .footer-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .back-link {
      font-size: 0.82rem;
      color: #505060;
      text-decoration: none;
      transition: color .15s;
    }
    .back-link:hover { color: #25D366; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: #404050;
      background: #0f0f16;
      border: 1px solid #1a1a24;
      border-radius: 20px;
      padding: 5px 12px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #25D366;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <a href="/" class="brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
    </div>
    <span class="brand-name">Zap<span>Bot</span></span>
  </a>

  <div class="card">
    <div class="card-header">
      <h1>Acessar painel</h1>
      <p>Informe suas credenciais para conectar seu WhatsApp.</p>
    </div>

    <div class="fields">
      <div class="field">
        <label for="emailInput">E-mail</label>
        <input id="emailInput" type="email" placeholder="seu@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="passwordInput">Senha</label>
        <input id="passwordInput" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
    </div>

    <a href="/painel" class="btn-primary" id="enterBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
      </svg>
      Entrar
    </a>

    <div class="footer-links">
      <a href="/" class="back-link">← Voltar para o início</a>
    </div>
  </div>

  <div class="badge">
    <span class="badge-dot"></span>
    Sistemas operacionais
  </div>

</body>
</html>
